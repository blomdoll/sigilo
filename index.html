<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sigilo - Red social de arte en texto</title>
  
  <!-- Configuración PWA e Iconos Nativos -->
  <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="Sigilo" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="manifest" href="/site.webmanifest" />

  <!-- Favicon dinámico SVG para la pestaña del navegador -->
  <link id="favicon" rel="icon" type="image/svg+xml" href="">
  <script>
    (function() {
      var THEME_COLORS = {
        durazno:'#C9785A', medianoche:'#8B7CF8', bosque:'#5A8A5C',
        cielo:'#4A86C8', rosa:'#C45C80', ambar:'#C8880A',
        pizarra:'#5A6E8A', nocturno:'#D4956A'
      };
      function getAccentColor() {
        try { var s=localStorage.getItem('sigilo_theme'); if(s&&THEME_COLORS[s]) return THEME_COLORS[s]; } catch(e){}
        return (window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches) ? '#8B7CF8' : '#C9785A';
      }
      function makeFavicon(color) {
        var svg='<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">'
          +'<path d="M16 3L17.4 13.2L27 16L17.4 18.8L16 29L14.6 18.8L5 16L14.6 13.2Z" fill="'+color+'"/>'
          +'<path d="M25 4L25.8 8.5L30 9.5L25.8 10.5L25 15L24.2 10.5L20 9.5L24.2 8.5Z" fill="'+color+'" opacity=".7"/>'
          +'<path d="M8 19L8.6 22.4L12 23.2L8.6 24L8 27.4L7.4 24L4 23.2L7.4 22.4Z" fill="'+color+'" opacity=".55"/>'
          +'</svg>';
        return 'data:image/svg+xml,'+encodeURIComponent(svg);
      }
      function updateFavicon() {
        var el=document.getElementById('favicon');
        if(el) el.href=makeFavicon(getAccentColor());
      }
      updateFavicon();
      if(window.matchMedia) window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', updateFavicon);
      window.updateFavicon=updateFavicon;
      window._FAVICON_THEME_COLORS=THEME_COLORS;
    })();
  </script>
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  
  <!-- Flaticon Uicons -->
  <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/2.6.0/uicons-regular-rounded/css/uicons-regular-rounded.css"/>
  <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/2.6.0/uicons-solid-rounded/css/uicons-solid-rounded.css"/>
  
  <!-- Estilos -->
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="styles_follows.css">
</head>
<body>
  <!-- Pantalla de autenticación -->
  <div id="auth">
    <div class="acard">
      <div class="alogo">✦ sigilo</div>
      <div class="asub">una comunidad para compartir arte en texto</div>
      <div class="atabs">
        <button class="atab on" id="tl" onclick="stab('login')">Ingresar</button>
        <button class="atab" id="tr" onclick="stab('register')">Registrarse</button>
      </div>
      <div id="lf">
        <div class="field"><label>Correo electrónico</label><input type="email" id="lu" placeholder="correo@ejemplo.com"/></div>
        <div class="field field-pw"><label>Contraseña</label><input type="password" id="lp" placeholder="••••••••"/><button class="pw-toggle" type="button" onclick="togglePw('lp',this)" tabindex="-1" aria-label="Mostrar contraseña">👁</button></div>
        <button class="btn-fill" onclick="login()">Ingresar</button>
        <div class="aerr" id="le"></div>
      </div>
      <div id="rf" style="display:none">
        <div class="field"><label>Nombre de usuario</label><input type="text" id="ru" placeholder="tu_usuario" autocomplete="username" autocorrect="off" autocapitalize="off" spellcheck="false"/></div>
        <div class="field"><label>Correo electrónico</label><input type="email" id="re" placeholder="correo@ejemplo.com"/></div>
        <div class="field field-pw"><label>Contraseña</label><input type="password" id="rp" placeholder="••••••••"/><button class="pw-toggle" type="button" onclick="togglePw('rp',this)" tabindex="-1" aria-label="Mostrar contraseña">👁</button></div>
        <button class="btn-fill" onclick="register()">Crear cuenta</button>
        <div class="aerr" id="ree"></div>
      </div>
    </div>
  </div>

  <!-- Pantalla principal de la aplicación -->
  <div id="app">
    <header>
      <div class="hlogo" onclick="gofeed()">✦ sigilo</div>
      <nav class="hnav">
        <!-- Navegación principal -->
        <div class="hnav-main">
          <button class="nbtn" id="nf" onclick="gofeed()">inicio</button>
          <button class="nbtn" id="np" onclick="goprofile()">perfil</button>
          <button class="nbtn" id="nc" onclick="gosettings()">ajustes</button>
        </div>
        <!-- Acciones secundarias -->
        <div class="hnav-actions">
          <button class="nlog" id="ns" onclick="toggleSearch()" title="Buscar usuarios">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </button>
          <button class="nlog notif-btn" id="notif-btn" onclick="toggleNotif()" title="Notificaciones" style="position:relative">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            <span id="notif-badge" class="notif-badge" style="display:none"></span>
          </button>
          <div class="hnav-divider"></div>
          <button class="nlog-out" onclick="logout()">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            salir
          </button>
        </div>
      </nav>
      <!-- Search overlay -->
      <div id="searchOverlay" style="display:none">
        <input id="searchInput" class="searchInput" placeholder="buscar usuarios..." oninput="searchUsers()" autocomplete="off"/>
        <div id="searchResults" class="searchResults"></div>
      </div>
    </header>
    <main id="mc"></main>
    <footer>Creado por <b>Sage Aksnes / @blomdoll</b> &nbsp;·&nbsp; <a href="legal.html" style="color:var(--tx3);text-decoration:none;font-size:.78rem;" onmouseover="this.style.color='var(--w1)'" onmouseout="this.style.color='var(--tx3)'">privacidad & términos</a></footer>

    <!-- Mobile bottom nav (solo visible en móvil) -->
    <nav class="mob-nav" id="mobNav">
      <button class="mob-nav-btn" id="mob-home" onclick="gofeed(); mobSetActive('home')" title="Inicio">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/><polyline points="9 21 9 12 15 12 15 21"/></svg>
        <span>inicio</span>
      </button>
      <button class="mob-nav-btn" id="mob-search" onclick="mobToggleSearch()" title="Buscar">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <span>buscar</span>
      </button>
      <button class="mob-nav-btn" id="mob-notif" onclick="toggleNotif(); mobSetActive('notif')" title="Notificaciones" style="position:relative">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span id="mob-notif-badge" class="notif-badge" style="display:none;top:4px;right:8px;"></span>
        <span>avisos</span>
      </button>
      <button class="mob-nav-btn" id="mob-profile" onclick="goprofile(); mobSetActive('profile')" title="Perfil">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span>perfil</span>
      </button>
      <button class="mob-nav-btn" id="mob-settings" onclick="gosettings(); mobSetActive('settings')" title="Ajustes">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        <span>ajustes</span>
      </button>
    </nav>

    <!-- Mobile search panel (solo visible en móvil) -->
    <div id="mobSearchPanel" class="mob-search-panel" style="display:none">
      <div class="mob-search-inner">
        <input id="mobSearchInput" class="mob-search-input" placeholder="buscar usuarios..." oninput="mobSearchUsers()" autocomplete="off"/>
        <button class="mob-search-close" onclick="mobCloseSearch()">✕</button>
      </div>
      <div id="mobSearchResults" class="searchResults"></div>
    </div>
  </div>

  <!-- Notificación toast -->
  <div class="toast" id="toast"></div>

  <!-- Script principal -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js"></script>
  <script src="script_follows.js"></script>
  <script src="script_chat.js"></script>
  <script>
    // Conectar el favicon dinámico con el sistema de temas de sigilo
    (function() {
      var _orig = window.applyTheme;
      window.applyTheme = function(themeId) {
        if(_orig) _orig(themeId);
        if(window.updateFavicon) {
          // Inyectar el color del nuevo tema antes de llamar updateFavicon
          try { localStorage.setItem('sigilo_theme', themeId); } catch(e) {}
          window.updateFavicon();
        }
      };
    })();
  </script>
</body>
</html>
