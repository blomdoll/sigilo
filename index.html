<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sigilo - Red social de arte en texto</title>
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  
  <!-- Estilos -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Pantalla de autenticación -->
  <div id="auth">
    <div class="acard">
      <div class="alogo">✦ sigilo</div>
      <div class="asub">una comunidad para compartir arte en texto</div>
      <div class="atabs">
        <button class="atab on" id="tl" onclick="stab('login')">Ingresar</button>
        <button class="atab" id="tr" onclick="stab('register')">Registrarse</button>
      </div>
      <div id="lf">
        <div class="field"><label>Nombre de usuario</label><input type="email" id="lu" placeholder="correo@ejemplo.com"/></div>
        <div class="field"><label>Contraseña</label><input type="password" id="lp" placeholder="••••••••"/></div>
        <button class="btn-fill" onclick="login()">Ingresar</button>
        <div class="aerr" id="le"></div>
      </div>
      <div id="rf" style="display:none">
        <div class="field"><label>Nombre completo</label><input id="rn" placeholder="Tu nombre"/></div>
        <div class="field"><label>Nombre de usuario</label><input id="ru" placeholder="tu_usuario"/></div>
        <div class="field"><label>Correo electrónico</label><input type="email" id="re" placeholder="correo@ejemplo.com"/></div>
        <div class="field"><label>Contraseña</label><input type="password" id="rp" placeholder="••••••••"/></div>
        <button class="btn-fill" onclick="register()">Crear cuenta</button>
        <div class="aerr" id="ree"></div>
      </div>
    </div>
  </div>

  <!-- Pantalla principal de la aplicación -->
  <div id="app">
    <!-- Dentro de <div id="app"> -->
<div class="layout-container">
  <!-- Columna Izquierda (Escritorio) -->
  <aside class="sidebar left">
    <div class="sticky-side">
      <button class="side-link on" onclick="gofeed()">✦ Inicio</button>
      <button class="side-link" onclick="goprofile()">✦ Perfil</button>
      <button class="side-link" onclick="stptab('saved')">✦ Guardados</button>
    </div>
  </aside>

  <main id="mc"></main>

  <!-- Columna Derecha (Escritorio) -->
  <aside class="sidebar right">
    <div class="sticky-side">
      <div class="side-card">
        <h3>Explorar</h3>
        <p>Busca nuevas inspiraciones en texto.</p>
        <button class="btn-fill" onclick="toggleSearch()" style="margin-top: 10px; font-size: 0.8rem;">Buscar</button>
      </div>
    </div>
  </aside>
</div>

<!-- Menú Inferior (Móvil) -->
<nav class="mobile-nav">
  <button class="m-nav-btn" onclick="gofeed()" title="Inicio">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
  </button>
  <button class="m-nav-btn" onclick="toggleSearch()" title="Buscar">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
  </button>
  <button class="m-nav-btn" onclick="stptab('saved')" title="Guardados">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
  </button>
  <button class="m-nav-btn" onclick="goprofile()" title="Perfil">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
  </button>
</nav>
    <header>
      <div class="hlogo" onclick="gofeed()">✦ sigilo</div>
      <nav class="hnav">
        <button class="nbtn" id="nf" onclick="gofeed()">inicio</button>
        <button class="nbtn" id="np" onclick="goprofile()">perfil</button>
        <button class="nlog" id="ns" onclick="toggleSearch()" title="Buscar usuarios">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </button>
        <button class="nlog notif-btn" id="notif-btn" onclick="toggleNotif()" title="Notificaciones" style="position:relative">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <span id="notif-badge" class="notif-badge" style="display:none"></span>
        </button>
        <button class="nlog-out" onclick="logout()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          salir
        </button>
      </nav>
      <!-- Search overlay -->
      <div id="searchOverlay" style="display:none">
        <input id="searchInput" class="searchInput" placeholder="buscar usuarios..." oninput="searchUsers()" autocomplete="off"/>
        <div id="searchResults" class="searchResults"></div>
      </div>
    </header>
    <main id="mc"></main>
    <footer>Creado por <b>Sage Aksnes / @blomdoll</b></footer>
  </div>

  <!-- Notificación toast -->
  <div class="toast" id="toast"></div>

  <!-- Script principal -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js"></script>
</body>
</html>
